name: Build NixOS Asahi Installer Package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: "write"
      contents: "write"

    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            system = aarch64-linux
            experimental-features = nix-command flakes
            keep-outputs = true
            keep-derivations = true

      - uses: cachix/cachix-action@v15
        with:
          name: nixos-asahi
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - run: |
          sudo apt-get install -y qemu-system-aarch64 qemu-efi binfmt-support qemu-user-static

      - name: build asahi installer package
        run: |
          nix build .#packages.aarch64-linux.asahiPackage
          cp $(readlink result)/package/nixos-asahi-*.zip $(basename result/package/nixos-asahi-*.zip)

      - uses: actions/upload-artifact@v3
        with:
          name: nixos-asahi-installer-package
          path: ./nixos-asahi-*.zip

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./nixos-asahi-*.zip
